<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohan Medico And Surgico</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f8fafc;
        }
        h2 {
            font-weight: 600;
            color: #1a1a1a;
        }
        /* HERO */
        .hero {
            background: linear-gradient(rgba(10,116,218,0.85), rgba(10,116,218,0.85)),
            url("https://images.unsplash.com/photo-1580281657527-47f249e8f4df?auto=format&fit=crop&w=1200&q=80");
           background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            margin: 0;
            font-size: 42px;
        }

        .hero p {
           margin-top: 10px;
            font-size: 18px;
        }

        /* LAYOUT */
        .layout {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            margin: auto;
            padding: 20px;
            background: white;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        padding: 20px;
        }

        .left, .right {
            flex: 1;
        }

        /* GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            background: #fff;
            padding: 8px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }
        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* CARD */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
           box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* FORM */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #0a74da;
            outline: none;
            box-shadow: 0 0 5px rgba(10,116,218,0.3);
        }

        button {
            background: linear-gradient(135deg, #0a74da, #095ab3);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        /* CONTACT BAR */
        .contact-bar {
            display: flex;
            justify-content: space-between;
            border-top: 2px solid rgba(255,255,255,0.2);
            align-items: center;
            background: #063970;
            color: white;
            padding: 14px 30px;
            font-size: 14px;
        }

        .contact-item-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .icon {
            font-size: 16px;
        }

        .label {
            font-weight: 600;
            opacity: 0.9;
        }

        .value {
            opacity: 0.95;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: #eee;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }
        }

        /* SLIDER (only for images) */
.slider {
    overflow: hidden;
    width: 100%;
}

.slider-track {
    display: flex;
    transition: transform 0.8s ease-in-out;
}

/* Each image takes EXACT half of container */
.slider-track img {
    width: 50%;
    flex-shrink: 0;   /* IMPORTANT */
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    padding: 8px;
    box-sizing: border-box;
}</style>
</head>

<body>

<!-- HERO -->

<div class="hero">
    <h1>Mohan Medico And Surgico</h1>
    <p>Wholesale Surgical Items Supplier</p>
</div>

<!-- CONTACT BAR -->
<div class="contact-bar">

    <div class="contact-item-inline">
        <span class="icon">📍</span>
        <span class="label">Address:</span>
        <span class="value">126 Arvind Pul Station Road, Etawah 206001</span>
    </div>

    <div class="contact-item-inline">
        <span class="icon">📞</span>
        <span class="label">Phone:</span>
        <span class="value">9412186972</span>
    </div>

    <div class="contact-item-inline">
        <span class="icon">📞</span>
        <span class="label">Alt Phone:</span>
        <span class="value">8077817016</span>
    </div>

</div>
<!-- MAIN -->
<div class="layout">

    <!-- LEFT (IMAGES) -->
    <div class="left">
        <h2 style="text-align:center;">Our Products</h2>
        <div class="slider">
            <div class="slider-track" id="sliderTrack">

                <img src="/images/img1.jpeg">
                <img src="/images/img2.jpeg">
                <img src="/images/img3.jpeg">
                <img src="/images/img4.jpeg">
                <img src="/images/img7.jpeg">
                <img src="/images/img6.jpeg">
                <img src="/images/img5.jpeg">
                <img src="/images/img8.jpeg">

                <!-- CLONE FIRST 2 -->
                <img src="/images/img1.jpeg">
                <img src="/images/img2.jpeg">

            </div>
        </div>
    </div>

    <!-- RIGHT (FORM) -->
    <div class="right">
        <div class="card">
            <h2>Request Items</h2>

            <form onsubmit="handleSubmit(event)">

                <div class="input-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="input-group">
                    <label for="Phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="input-group">
                    <label for="items">Items Required</label>
                    <textarea id="items" rows="4" required></textarea>
                </div>

                <button type="submit">Submit Request</button>

            </form>
        </div>
    </div>

</div>



<footer>
    © 2026 Mohan Medico And Surgico
</footer>

<!-- SCRIPT -->
<script>
 let index = 0;
const track = document.getElementById("sliderTrack");
const totalSlides = 4; // original slides only

setInterval(() => {
    index++;

    track.style.transition = "transform 0.8s ease-in-out";
    track.style.transform = `translateX(-${index * 100}%)`;

    // when reaching cloned slides
    if (index === totalSlides) {
        setTimeout(() => {
            track.style.transition = "none"; // remove animation
            track.style.transform = `translateX(0%)`;
            index = 0;
        }, 800); // match transition time
    }

}, 2500);


    function handleSubmit(event) {
    event.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const items = document.getElementById("items").value;

    console.log("API CALL:", window.location.origin);

    fetch("/save", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            phone: phone,
            items: items
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Server error");
        }
        return response.json();
    })
    .then(data => {
        alert("Request saved successfully!");
        document.querySelector("form").reset();
    })
    .catch(error => {
        console.error(error);
        alert("Error saving request!");
    });
}
</script>

</body>
</html>
